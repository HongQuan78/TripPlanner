name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TripPlanner.slnx

      - name: Build
        run: dotnet build TripPlanner.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test TripPlanner.Tests/TripPlanner.Tests.csproj --no-build --configuration Release
